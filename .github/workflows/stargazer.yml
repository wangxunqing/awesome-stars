name: Update Starred Repos List

on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 00:00 执行（香港时间早上8点）
  workflow_dispatch:             # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate starred list
        uses: rverst/stargazer@v1      # 用最新版本，写 v1 即可自动取最新
        with:
          github-user: ${{ github.actor }}          # 自动用仓库拥有者（你自己）
          github-token: ${{ secrets.GITHUB_TOKEN }} # 默认就有权限
          list-file: README.md
          format: list                              # 或者 table（表格形式更美观）

      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add README.md
          git commit -m "chore: update starred repositories list" || echo "No changes to commit"
          git push
