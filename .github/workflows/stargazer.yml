name: update awesome-stars (by topic)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write   # ←←← 添加这一行

jobs:
  awesome-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install starred
        run: python -m pip install --upgrade pip && pip install starred

      - name: Update repo category by topic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          starred --username ${{ github.repository_owner }} --token $GITHUB_TOKEN --topic --sort --message 'awesome-stars category by topic update by github actions cron, created by starred'

      - name: Commit changes if any
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add README.md
          git commit -m "chore: update starred repositories list" || echo "No changes to commit"
          git push
